name: Deploy Docusaurus to GitHub Pages Repo

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      # https://github.com/actions/checkout/releases
      - name: Checkout Source Code
        uses: actions/checkout@v7
        with:
          # 关闭凭证持久化:否则 checkout 会把 GITHUB_TOKEN 留在 git 配置里,
          # 后面 JamesIves 部署步骤用 PAT 跨仓库 push 时会被它顶掉,报 github-actions[bot] 403。
          persist-credentials: false

      # 2. 安装 pnpm
      # https://github.com/pnpm/action-setup/releases
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          # 不指定 pnpm 版本, 默认使用 package.json 中配置的 packageManager 版本
          # version: 11.4.0
          cache: true

      # 3. 设置 Node.js 环境
      # https://github.com/actions/setup-node/releases
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "24.11.1" # 或者指定具其他版本

      # 4. 安装依赖
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile # 使用 frozen-lockfile 确保依赖版本与 pnpm-lock.yaml 完全一致

      # 5. 构建 Docusaurus 静态文件
      - name: Build Website
        run: pnpm run build

      # 5.5 诊断:确认 DEPLOY_TOKEN 在【本仓库】可读且对目标仓库有 push 权限
      # 确认无误后可删除此步骤
      - name: Debug deploy token
        env:
          TOKEN: ${{ secrets.DEPLOY_TOKEN }}
        run: |
          echo "DEPLOY_TOKEN length = ${#TOKEN}"
          if [ -z "$TOKEN" ]; then
            echo "::error::DEPLOY_TOKEN 在本仓库 (magicianlib/website) 的 secrets 里为空或不存在!"
            echo "::error::secret 必须建在【运行 workflow 的源仓库 magicianlib/website】, 不是目标仓库 ituknown.github.io, 也不是组织级 secret。"
            exit 1
          fi
          echo "=== 用该 token 查询目标仓库 ituknown/ituknown.github.io 的权限 ==="
          curl -s -H "Authorization: token $TOKEN" \
            https://api.github.com/repos/ituknown/ituknown.github.io | grep -A6 '"permissions"'

      # 6. 将构建产物部署到目标仓库
      # https://github.com/JamesIves/github-pages-deploy-action/releases
      - name: Deploy to Target Repo
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository-name: ituknown/ituknown.github.io
          branch: main # 目标仓库接收静态文件的分支
          folder: build # Docusaurus 默认构建输出的目录
          clean: true # 部署时自动清理目标分支中旧的多余文件
